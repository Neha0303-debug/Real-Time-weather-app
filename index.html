<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <title>Weather App</title>
</head>
<body>
    <div class="main">
        <!--Search-->
        <div class="search">
            <input placeholder="Enter city name">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>
        <h3>About Today</h3>
        <div class="forecast">
            <img src="sunny_weather.png" id="weather-icon">
            <div id="city">Mumbai</div>
            <div id="temperature">20 °c</div>
        </div>
        <!-- Weather details -->
        <div class="weather_data">
            <!--humidity-->
            <div class="humidity block">
                <img src="humidity.png">
                <p class="data water">21%</p>
                <p class="measurement">Humidity</p>
            </div>

            <div class="windspeed block">
                <!--windspeed-->
                <img src="windspeed.png">
                <p class="data speed">7km/h</p>
                <p class="measurement">Wind</p>
            </div>

            <div class="tempeature block">
                <!--tempearture-->
                <img src="tempeature.png">
                <p class="data temp">20 °c</p>
                <p class="measurement">tempeature</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
